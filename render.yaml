services:
  # 1. Backend: Chạy FastAPI
  - type: web
    name: opc-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10

  # 2. Frontend: Chạy Streamlit
  - type: web
    name: opc-frontend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run app.py --server.port 8501"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: OPENAI_API_KEY
        value: <Dán_API_Key_của_ông_vào_đây>
